<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>铁板神数纯前端测算</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f9; color: #111; }
    .wrap { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.05); margin-bottom: 16px; }
    h1 { margin: 0 0 12px; font-size: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-size: 14px; color: #444; display: block; margin-bottom: 4px; }
    input, select, button, textarea { width: 100%; padding: 10px; border: 1px solid #d0d5dd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    button { background: #1769ff; color: #fff; border: none; cursor: pointer; }
    button:disabled { background: #8aaeff; cursor: wait; }
    .small { font-size: 12px; color: #666; }
    .err { color: #b42318; white-space: pre-wrap; }
    .ok { color: #027a48; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #e5e7eb; padding: 6px; text-align: left; vertical-align: top; }
    thead { background: #f1f5f9; position: sticky; top: 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>铁板神数（纯前端版）</h1>
      <p class="small">本页面不依赖服务器，所有计算在浏览器本地完成。首次加载会读取本地数据库 CSV。</p>
      <div class="grid">
        <div>
          <label>性别</label>
          <select id="gender">
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <div>
          <label>出生时间（YYYY-MM-DD HH:MM）</label>
          <input id="birthTime" value="2003-11-28 13:10" />
        </div>
      </div>
      <div class="grid" style="margin-top: 12px;">
        <div>
          <label>求测时间（YYYY-MM-DD HH:MM）</label>
          <input id="queryTime" value="2026-04-20 00:14" />
        </div>
        <div style="display:flex;align-items:flex-end;">
          <button id="runBtn">开始测算</button>
        </div>
      </div>
      <p id="status" class="small"></p>
      <p id="error" class="err"></p>
    </div>

    <div class="card">
      <h3>基础结果</h3>
      <textarea id="coreResult" rows="10" readonly></textarea>
    </div>

    <div class="card">
      <h3>本命条文数字（可自行查库）</h3>
      <textarea id="destinyResult" rows="10" readonly></textarea>
    </div>

    <div class="card">
      <h3>流年条文（1-100岁）</h3>
      <div style="overflow:auto; max-height: 520px;">
        <table>
          <thead>
            <tr>
              <th>岁数</th>
              <th>干支</th>
              <th>四声</th>
              <th>标记</th>
              <th>字母</th>
              <th>原条文</th>
              <th>原断语</th>
              <th>校正后条文</th>
              <th>校正后断语</th>
            </tr>
          </thead>
          <tbody id="liunianBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="./frontend_app.js"></script>
</body>
</html>
